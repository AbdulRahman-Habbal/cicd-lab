name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/k8s-frontend:$IMAGE_TAG ./app/frontend
          docker push $ECR_REGISTRY/k8s-frontend:$IMAGE_TAG

      - name: Build and Push Backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/k8s-backend:$IMAGE_TAG ./app/backend
          docker push $ECR_REGISTRY/k8s-backend:$IMAGE_TAG

      - name: Update Kubernetes Manifests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|PLACEHOLDER|$ECR_REGISTRY/k8s-frontend:$IMAGE_TAG|g" manifests/frontend.yaml
          sed -i "s|PLACEHOLDER|$ECR_REGISTRY/k8s-backend:$IMAGE_TAG|g" manifests/backend.yaml

      - name: Deploy to EKS (Dev)
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}
          kubectl apply -f manifests/ -n dev